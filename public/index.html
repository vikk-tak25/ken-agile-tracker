<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agile Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Agile Tracker</h1>
    </header>

    <main>
        <section class="form-section">
            <h2>Lisa uus story</h2>

            <form id="story-form">
                <div class="form-group">
                    <label for="title">Pealkiri</label>
                    <input type="text" id="title" name="title">
                </div>

                <div class="form-group">
                    <label for="description">Kirjeldus</label>
                    <textarea id="description" name="description" rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label for="points">Punktid</label>
                    <input type="number" id="points" name="points" min="0">
                </div>

                <div class="form-group">
                    <label for="acceptanceCriteria">Vastuvõtutingimused</label>
                    <textarea
                        id="acceptanceCriteria"
                        name="acceptanceCriteria"
                        rows="4"
                        placeholder="Kirjuta iga vastuvõtutingimus eraldi reale"
                    ></textarea>
                </div>

                <button type="submit" id="submit-button">Lisa story</button>
<button type="button" id="cancel-edit-button" class="secondary-button hidden">Tühista muutmine</button>
            </form>

            <p id="form-message"></p>
        </section>

        <section class="kanban-board">
            <div class="kanban-column">
                <h2>Todo / Backlog</h2>
                <p class="points-total" id="todo-points">Punkte kokku: 0</p>
                <div id="todo-column" class="story-list"></div>
            </div>

            <div class="kanban-column">
                <h2>Doing</h2>
                <p class="points-total" id="doing-points">Punkte kokku: 0</p>
                <div id="doing-column" class="story-list"></div>
            </div>

            <div class="kanban-column">
                <h2>Done</h2>
                <p class="points-total" id="done-points">Punkte kokku: 0</p>
                <div id="done-column" class="story-list"></div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
